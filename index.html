<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#141414" />
  <title>Salty Cowboys · Book your experience</title>
  <meta name="description" content="Book a horse riding experience at Salty Cowboys — Bali horse rescue sanctuary & riding centre." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" />
  <style>
    html, body { margin: 0; padding: 0; background: #0e0b08; -webkit-text-size-adjust: 100%; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #141414; color: #f5ede0;
      font-family: Georgia, 'Times New Roman', serif; gap: 14px;
    }
    #loading .spinner {
      width: 34px; height: 34px; border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.18);
      border-top-color: #1a1a1a;
      animation: spin 0.8s linear infinite;
    }
    #loading .lbl { font-style: italic; font-size: 17px; opacity: 0.85; letter-spacing: 0.3px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="lbl">Salty Cowboys</div>
  </div>
  <div id="root"></div>

// ─── TIME SLOTS ──────────────────────────────────────────────────────────────
// Slots depend on the duration chosen, so they live here rather than on the
// activity. Saturday afternoons are closed, so afternoon slots are filtered out
// at render time (see slotsFor); Sundays are blocked in the date picker.

const RIDE_SLOTS = {
  "1hr": ["8:00am", "5:00pm"],
  "1.5hr": ["8:00am", "4:30pm"],
  "2hr": ["8:00am", "4:00pm"]
};
const LESSON_SLOTS = {
  "1hr": ["8:30am", "5:00pm"],
  "1.5hr": ["8:30am", "4:30pm"],
  "2hr": ["8:30am", "4:00pm"]
};
const DRESSAGE_SLOTS = ["9:00am", "10:00am", "4:00pm", "5:00pm"];
const WHISPER_SLOTS = ["8:30am"];
// Photoshoots run any time between 08:00 and 16:00. They now carry slots so the
// Saturday afternoon closure can apply to them too.
const PHOTO_SLOTS = ["8:00am", "9:00am", "10:00am", "11:00am", "12:00pm", "1:00pm", "2:00pm", "3:00pm", "4:00pm"];

// "4:30pm" -> 16.5, used to tell morning from afternoon.
function slotHour(slot) {
  const m = /^(\d+):(\d+)(am|pm)$/.exec(slot);
  if (!m) return 0;
  let h = parseInt(m[1], 10);
  if (m[3] === "pm" && h !== 12) h += 12;
  if (m[3] === "am" && h === 12) h = 0;
  return h + parseInt(m[2], 10) / 60;
}
function isSaturday(s) {
  return new Date(s.y, s.m, s.d).getDay() === 6;
}

// Slots available for an activity + duration on the chosen date(s).
function slotsFor(actObj, duration, dates) {
  if (!actObj) return [];
  let list;
  if (actObj.id === "dressage") list = DRESSAGE_SLOTS;
  else if (actObj.id === "whisper") list = WHISPER_SLOTS;
  else if (actObj.photoshoot) list = PHOTO_SLOTS;
  else if (actObj.riding) list = RIDE_SLOTS[duration] || [];
  else list = LESSON_SLOTS[duration] || [];
  // Closed Saturday afternoon. For a multi-day course, one Saturday in the set
  // is enough to restrict the whole course to a morning start.
  if (dates && dates.length && dates.some(isSaturday)) {
    list = list.filter(s => slotHour(s) < 12);
  }
  return list;
}

// Monday of the week a date falls in, as a comparable key. Used to keep the
// Horse Whisperer course inside a single Mon–Sat week.
function weekKey(s) {
  const dow = new Date(s.y, s.m, s.d).getDay();
  const mon = new Date(s.y, s.m, s.d + (dow === 0 ? -6 : 1 - dow));
  return mon.getFullYear() + "-" + mon.getMonth() + "-" + mon.getDate();
}

// Group size caps are per activity now, so this is built from maxPeople.
function peopleOptions(actObj) {
  const max = actObj && actObj.maxPeople ? actObj.maxPeople : 5;
  return Array.from({ length: max }, (_, i) => String(i + 1));
}

// ─── HELPERS ────────────────────────────────────────────────────────────────

function getDaysInMonth(year, month) {
  return new Date(year, month + 1, 0).getDate();
}
function getFirstDay(year, month) {
  return new Date(year, month, 1).getDay();
}
const MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
const DAY_NAMES = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];

// Build the WhatsApp message that lands in Simone's inbox (always English).
// Weight + experience are included so Simone can match each rider to a horse herself.
function buildWhatsAppMessage({
  actObj,
  durationLabel,
  formattedDates,
  isCourse,
  selectedTime,
  numPeople,
  riders,
  isRiding,
  notes,
  photographer,
  grooming
}) {
  const lines = [];
  lines.push("🐴 *New booking request — Salty Cowboys*");
  lines.push("");
  if (actObj) lines.push("Activity: " + T.en.activities[actObj.id] + (durationLabel ? " (" + durationLabel + ")" : ""));
  if (grooming) lines.push("Grooming: " + (grooming === "wet" ? "Wet" : "Dry"));
  if (photographer) lines.push("Add-on: Salty Cowboy photographer (IDR 2,000,000/hr · 20 edited images)");
  if (formattedDates && formattedDates.length) {
    if (formattedDates.length > 1) {
      lines.push("Course dates (" + formattedDates.length + " days): " + formattedDates.join(" · "));
      if (selectedTime) lines.push("Start time each day: " + selectedTime);
    } else {
      lines.push("Date & time: " + formattedDates[0] + (selectedTime ? " · " + selectedTime : ""));
    }
  }
  lines.push("Group size: " + numPeople);
  lines.push("");
  lines.push("*Riders:*");
  riders.forEach((r, i) => {
    const ageNum = parseInt(r.age, 10);
    const parts = [];
    const who = r.name && r.name.trim() ? r.name.trim() : "Rider " + (i + 1);
    let line = "• " + who;
    if (r.age) line += ", age " + r.age;
    if (r.experience) parts.push(T.en[r.experience]); // experience label in English
    if (isRiding && r.weight) parts.push(T.en[r.weight]);
    if (parts.length) line += " — " + parts.join(", ");
    if (!isNaN(ageNum) && ageNum < 18) line += " (parent/guardian permission confirmed)";
    lines.push(line);
  });
  // Simone only has 2 horses that can carry a rider over 70kg, so call it out.
  if (isRiding) {
    const heavy = riders.filter(r => r.weight === "w3").length;
    if (heavy > 0) lines.push("⚠️ " + heavy + " rider(s) over 70kg — needs a heavier-weight horse");
  }
  if (isCourse) lines.push("Course must run Mon–Sat within one week");
  lines.push("");
  lines.push("Notes: " + (notes && notes.trim() ? notes.trim() : "—"));
  lines.push("");
  lines.push("_Sent from the online booking page · pending Simone's approval_");
  return lines.join("\n");
}
function openWhatsApp(message) {
  const url = "https://wa.me/" + WA_NUMBER + "?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
}
function fallbackCopy(text, done) {
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    if (done) done();
  } catch (e) {}
}

// ─── MAIN COMPONENT ──────────────────────────────────────────────────────────

function App() {
  const [lang, setLang] = useState("en");
  const t = T[lang];
  const [screen, setScreen] = useState("activity"); // activity | riders | calendar | confirm
  const [activity, setActivity] = useState(null);
  const [duration, setDuration] = useState(null);
  const [numPeople, setNumPeople] = useState(null);
  const [riders, setRiders] = useState([]);
  const [calMonth, setCalMonth] = useState(4); // May (0-indexed)
  const [calYear, setCalYear] = useState(2026);
  const [selectedDates, setSelectedDates] = useState([]); // array of { y, m, d }
  const [selectedTime, setSelectedTime] = useState(null);
  const [notes, setNotes] = useState("");
  const [photographer, setPhotographer] = useState(false);
  const [grooming, setGrooming] = useState(null); // "wet" | "dry" — Master Class Horse Care only
  const [activeCat, setActiveCat] = useState(ACTIVITIES[0].category);
  const [sentMessage, setSentMessage] = useState("");
  const [copied, setCopied] = useState(false);
  const actObj = ALL_ACTIVITIES.find(a => a.id === activity);
  const isPhotoshoot = actObj?.photoshoot === true;
  const isRiding = actObj?.riding === true; // weight rules apply to these only
  const isWhisper = activity === "whisper";
  // "Rider" only for the Rides category; Photoshoots and Lessons say "Person".
  const actCategory = actObj ? (ACTIVITIES.find(c => c.items.some(it => it.id === actObj.id)) || {}).category : null;
  const personNoun = actCategory === "Rides" ? t.rider : t.personLabel;
  const isCourse = actObj?.course === true;
  const needsGrooming = actObj?.grooming === true;
  const requiredDates = actObj?.courseDays || 1; // Horse Whisperer Course runs over 3 days

  function initRiders(n) {
    const count = parseInt(n, 10);
    setRiders(Array.from({
      length: count
    }, (_, i) => ({
      id: i,
      label: count === 1 ? t.rider : t.rider + " " + (i + 1),
      name: "",
      age: "",
      permission: false,
      weight: "",
      experience: ""
    })));
    setNumPeople(n);
  }
  function updateRider(idx, field, val) {
    setRiders(prev => prev.map((r, i) => i === idx ? {
      ...r,
      [field]: val
    } : r));
  }
  function resetAll() {
    setScreen("activity");
    setActivity(null);
    setDuration(null);
    setNumPeople(null);
    setRiders([]);
    setSelectedDates([]);
    setSelectedTime(null);
    setNotes("");
    setPhotographer(false);
    setGrooming(null);
    setSentMessage("");
    setCopied(false);
  }
  const step = screen === "activity" ? 1 : screen === "riders" ? 2 : screen === "calendar" ? 3 : 4;

  // ── Weight + age rules ──
  // Max rider weight is 78kg (w4 is over that, so it blocks). Only 2 horses can
  // carry a rider over 70kg, so at most 2 riders may sit in the 70–78kg band.
  // Neither rule applies to photoshoots or off-saddle lessons.
  const anyOverMax = isRiding && riders.some(r => r.weight === "w4");
  const heavyCount = isRiding ? riders.filter(r => r.weight === "w3").length : 0;
  const tooManyHeavy = heavyCount > 2;
  const minAge = actObj?.minAge || 0;
  const anyUnderMinAge = minAge > 0 && riders.some(r => {
    const n = parseInt(r.age, 10);
    return r.age !== "" && !isNaN(n) && n < minAge;
  });

  const ridersFilled = riders.length > 0 && riders.every(r => {
    const ageNum = parseInt(r.age, 10);
    const ageOk = isPhotoshoot || (r.age !== "" && !isNaN(ageNum) && ageNum > 0 && ageNum < 120);
    const minorOk = isNaN(ageNum) || ageNum >= 18 || r.permission;
    return r.name.trim() && ageOk && (!isRiding || r.weight) && (isPhotoshoot || r.experience) && minorOk;
  });
  const ridersComplete = ridersFilled && !anyOverMax && !tooManyHeavy && !anyUnderMinAge;
  const detailsComplete = !!duration && !!numPeople && (!needsGrooming || !!grooming) && ridersComplete;
  const daysInMonth = getDaysInMonth(calYear, calMonth);
  const firstDay = getFirstDay(calYear, calMonth);
  // The sanctuary runs Monday to Saturday; Sundays are closed. Saturday
  // afternoons are closed too, which is handled at the time-slot level.
  // A course must sit inside one Mon–Sat week, so once the first day is picked
  // every day outside that week is greyed out.
  function isAvailableDay(day) {
    const d = new Date(calYear, calMonth, day);
    if (d.getDay() === 0) return false;
    if (isCourse && selectedDates.length > 0) {
      if (weekKey({ y: calYear, m: calMonth, d: day }) !== weekKey(selectedDates[0])) return false;
    }
    return true;
  }
  function isDaySelected(day) {
    return selectedDates.some(s => s.y === calYear && s.m === calMonth && s.d === day);
  }
  function handleDayClick(day) {
    if (!isAvailableDay(day)) return;
    const here = {
      y: calYear,
      m: calMonth,
      d: day
    };
    const already = isDaySelected(day);
    if (requiredDates === 1) {
      setSelectedDates(already ? [] : [here]);
      setSelectedTime(null);
    } else {
      if (already) {
        setSelectedDates(prev => prev.filter(s => !(s.y === calYear && s.m === calMonth && s.d === day)));
      } else if (selectedDates.length < requiredDates) {
        setSelectedDates(prev => [...prev, here]);
      }
    }
  }
  function removeDate(target) {
    setSelectedDates(prev => prev.filter(s => !(s.y === target.y && s.m === target.m && s.d === target.d)));
  }
  function changeMonth(delta) {
    if (delta < 0) {
      if (calMonth === 0) {
        setCalMonth(11);
        setCalYear(y => y - 1);
      } else setCalMonth(m => m - 1);
    } else {
      if (calMonth === 11) {
        setCalMonth(0);
        setCalYear(y => y + 1);
      } else setCalMonth(m => m + 1);
    }
  }
  function formatOne(s) {
    return MONTHS[s.m] + " " + s.d + ", " + s.y;
  }
  const sortedDates = [...selectedDates].sort((a, b) => a.y - b.y || a.m - b.m || a.d - b.d);
  const formattedDates = sortedDates.map(formatOne);
  const datesComplete = selectedDates.length === requiredDates;
  // Slots depend on activity, duration and the date: Saturday afternoons are
